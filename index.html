<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrX Photobooth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <video autoplay muted loop id="bg-video">
    <source src="" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">

    <div class="top-bar">
      <h1>MRX PHOTOBOOTH</h1>

      <div class="controls">
        <input type="file" id="bgUpload" accept="image/*">
        <button id="captureBtn">📸 Ambil Foto</button>
        <button id="downloadBtn">⬇ Download</button>
      </div>
    </div>

    <div class="camera-box">

      <div class="camera-frame">
        <video id="video" autoplay playsinline></video>

        <div class="frame-decoration frame1"></div>
        <div class="frame-decoration frame2"></div>
      </div>

      <canvas id="canvas"></canvas>

    </div>

    <div class="filters">
      <button data-filter="none">Normal</button>
      <button data-filter="grayscale(1)">B&W</button>
      <button data-filter="sepia(1)">Vintage</button>
      <button data-filter="contrast(1.3)">Cinema</button>
      <button data-filter="brightness(1.2)">Bright</button>
      <button data-filter="saturate(2)">Cute</button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
